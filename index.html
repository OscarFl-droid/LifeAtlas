<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1f1b" />
  <meta name="description" content="CareerAtlas — an offline-first adaptive professional capability engine." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="assets/styles.css" />
  <title>CareerAtlas · LifeAtlas ACE</title>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button class="brand" data-nav="today" aria-label="LifeAtlas home">
        <span class="brand-mark">LA</span><span><strong>LifeAtlas</strong><small>Living Capability Engine</small></span>
      </button>
      <div class="top-actions">
        <span id="offlineBadge" class="status-pill">Local-first</span>
        <button id="installBtn" class="button ghost" hidden>Install</button>
      </div>
    </header>

    <main id="app" tabindex="-1"></main>

    <nav class="bottom-nav" aria-label="Primary navigation">
      <button data-nav="today" class="active"><span>◉</span>Today</button>
      <button data-nav="log"><span>＋</span>Log</button>
      <button data-nav="atlas"><span>✦</span>Atlas</button>
      <button data-nav="history"><span>↺</span>History</button>
      <button data-nav="settings"><span>⚙</span>Data</button>
    </nav>
  </div>
  <div id="toast" role="status" aria-live="polite"></div>
  <script type="module" src="assets/app.js"></script>
</body>
</html>
